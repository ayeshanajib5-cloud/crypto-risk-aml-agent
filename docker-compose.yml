services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: '24'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server kafka:9092 --list']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - crypto-net
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: crypto-risk-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - crypto-net
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: crypto_risk
      POSTGRES_USER: riskadmin
      POSTGRES_PASSWORD: changeme_in_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U riskadmin -d crypto_risk']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto-net
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto-net
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: ws-producer
    hostname: ws-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAW_TRADES_TOPIC: raw-trades
    restart: on-failure
    networks:
      - crypto-net
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aml-api
    hostname: aml-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: crypto_risk
      POSTGRES_USER: riskadmin
      POSTGRES_PASSWORD: changeme_in_prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - crypto-net

  spark:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile
    container_name: spark-aml
    hostname: spark-aml
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAW_TRADES_TOPIC: raw-trades
      RISK_SIGNALS_TOPIC: market-risk-signals
      POSTGRES_URL: jdbc:postgresql://postgres:5432/crypto_risk
      POSTGRES_USER: riskadmin
      POSTGRES_PASSWORD: changeme_in_prod
      ZSCORE_ALERT_THRESHOLD: "3.0"
      ZSCORE_CRITICAL_THRESHOLD: "5.0"
    command: spark-submit --master local[2] /app/vwap_zscore.py
    restart: on-failure
    networks:
      - crypto-net

volumes:
  postgres-data:
    driver: local
networks:
  crypto-net:
    driver: bridge
